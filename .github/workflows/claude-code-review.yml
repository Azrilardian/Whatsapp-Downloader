name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    # Skip draft PRs; re-run on every new push to the PR (synchronize)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request against the WhatsApp Downloader project's
            contract docs — _bmad-output/specs/spec-whatsapp-downloader/SPEC.md,
            the PRD, and ARCHITECTURE-SPINE.md (especially the AD-1..AD-17
            invariants: fail-closed defaults, single-writer-per-domain,
            WAL/busy_timeout, the one guarded fetcher, dir<->status
            filesystem invariant). Flag correctness bugs, security issues
            (SSRF, path traversal, secrets in the DB), and violations of
            those architecture invariants. Post the findings as a single
            PR review comment; do not push commits.
          claude_args: |
            --allowed-tools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*)"
